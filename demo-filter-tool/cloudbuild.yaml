substitutions:
  _REGION: us-west2
  _REPO: demo-filter-tool-repo

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA', 'demo-filter-tool']
    id: build-web

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA']
    id: push-web
    waitFor: ['build-web']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/refresh:$SHORT_SHA', 'demo-filter-tool/refresh']
    id: build-refresh

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/refresh:$SHORT_SHA']
    id: push-refresh
    waitFor: ['build-refresh']

  - name: 'gcr.io/google.com/cloudsdk-cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - demo-filter-tool
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA'
      - '--region=${_REGION}'
    id: deploy-web
    waitFor: ['push-web']

  - name: 'gcr.io/google.com/cloudsdk-cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - demo-filter-tool-refresh
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/refresh:$SHORT_SHA'
      - '--region=${_REGION}'
    id: deploy-refresh
    waitFor: ['push-refresh']